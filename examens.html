<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Liste des examens</title>
</head>
<body>
  <h1>Examens enregistrés</h1>
  <div class="input-row">
    <input type="text" id="proprietaire" placeholder="Nom du propriétaire">
    <button id="afficher">Afficher</button>
  </div>
  <div id="resultat"></div>
  <div class="links">
  <a href="index.html">Accueil</a> |
  <a href="ajouter-question.html">Ajouter une question</a>
  </div>

  <script>
    document.getElementById('afficher').addEventListener('click', () => {
      const proprietaire = document.getElementById('proprietaire').value;
      const key   = 'examens_' + proprietaire;
      const exams = JSON.parse(localStorage.getItem(key)) || [];
      const resultat = document.getElementById('resultat');
      resultat.innerHTML = '';

      if (exams.length === 0) {
        resultat.innerHTML = '<p>Aucun examen trouvé.</p>';
        return;
      }

      exams.forEach(exam => {
        const div = document.createElement('div');
        div.innerHTML = '<h2>' + exam.nom + '</h2>' +
                        '<p>Durée : ' + exam.duree + ' min</p>' +
                        '<p>' + exam.description + '</p>';

        const ul = document.createElement('ul');
        exam.questions.forEach(q => {
          const li = document.createElement('li');
          li.textContent = q.enonce + ' (' + q.points + ' pts)';
          ul.appendChild(li);
        });

        div.appendChild(ul);
        resultat.appendChild(div);
      });
    });
  </script>
  <style>
  
body {
  font-family: Arial, sans-serif;
  background-color: #f0f2f5;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;  
  align-items: center;     
  padding: 40px 20px;
}

h1 {
  color: #0066aa;
  margin: 0;
  margin-bottom: 30px;    
  text-align: center;
}


.input-row {
  display: flex;
  justify-content: center;
  gap: 15px;
  width: 100%;
  max-width: 600px;
  margin-bottom: 40px;      
}

input {
  flex: 2;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  background-color: #f9f9f9;
  font-size: 16px;
}

input:focus {
  outline: none;
  border-color: #0066aa;
  box-shadow: 0 0 8px rgba(0,102,170,0.4);
}

button {
  flex: 1;
  background-color: #0066aa;
  color: #fff;
  border: none;
  padding: 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.3s ease;
}

button:hover {
  background-color: #004f80;
}


#resultat {
  width: 100%;
  max-width: 800px;
  margin-bottom: 40px;      
}


.links {
  text-align: center;
}

.links a {
  color: #0066aa;
  text-decoration: none;
  margin: 0 12px;
}

.links a:hover {
  text-decoration: underline;
}



  </style>
</body>
</html>
