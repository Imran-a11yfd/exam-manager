<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter une question</title>
</head>
<body>
  <h1>Ajouter une question à un examen</h1>
  <form id="form-question">
    <input type="text" id="proprietaire" placeholder="Nom du propriétaire" required><br><br>
    <input type="text" id="nom-examen" placeholder="Nom de l'examen" required><br><br>
    <textarea id="enonce" placeholder="Énoncé de la question" required></textarea><br><br>
    <input type="number" id="duree-question" placeholder="Durée (secondes)" required><br><br>
    <input type="number" id="points" placeholder="Points" required><br><br>
    <div id="propositions"></div>
    <button type="button" id="add-proposition">+ Ajouter une proposition</button><br><br>
    <button type="submit">Ajouter la question</button>
  </form>
  <br>
  <a href="index.html">Accueil</a> |
  <a href="examens.html">Voir les examens</a>
  <script src="ajouter-question.js"></script>
</body>
</html>
