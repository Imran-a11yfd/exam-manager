<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter une question</title>
</head>
<body>
  <h1>Ajouter une question à un examen</h1>
  <form id="form-question">
    <input type="text" id="proprietaire" placeholder="Nom du propriétaire" required><br><br>
    <input type="text" id="nom-examen" placeholder="Nom de l'examen" required><br><br>
    <textarea id="enonce" placeholder="Énoncé de la question" required></textarea><br><br>
    <input type="number" id="duree-question" placeholder="Durée (secondes)" required><br><br>
    <input type="number" id="points" placeholder="Points" required><br><br>
    <div id="propositions"></div>
    <button type="button" id="add-proposition">+ Ajouter une proposition</button><br><br>
    <button type="submit">Ajouter la question</button>
  </form>
  <br>
  <a href="index.html">Accueil</a> |
  <a href="examens.html">Voir les examens</a>
<style>

body {
  font-family: Arial, sans-serif;
  background-color: #f0f2f5;
  margin: 0;
  min-height: 100vh;           
  display: flex;
  flex-direction: column;      
  align-items: center;         
  justify-content: space-between; 
  padding: 40px 20px;
}

h1 {
  color: #0066aa;
  margin: 0;
  margin-bottom: 30px;       
  text-align: center;
}

form {
  background-color: #ffffff;
  width: 100%;
  max-width: 800px;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
}

input, textarea {
  width: 100%;                 
  padding: 14px;
  margin: 12px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
  background-color: #f9f9f9;
  color: #333;
  font-size: 16px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0066aa;
  box-shadow: 0 0 8px rgba(0,102,170,0.4);
}

.buttons-row {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
  width: 100%;
}

button {
  flex: 1;
  background-color: #0066aa;
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.3s ease;
}

button:hover {
  background-color: #004f80;
}

.links {
  text-align: center;
}

.links a {
  color: #0066aa;
  text-decoration: none;
  margin: 0 12px;
}

.links a:hover {
  text-decoration: underline;
}
  </style>
  <script src="ajouter-question.js"></script>
</body>
</html>
