<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter un Examen</title>
</head>
<body>
  <h1>Créer un nouvel examen</h1>
  <form id="form-examen">
    <input type="text" id="nom" placeholder="Nom de l'examen" required><br><br>
    <input type="number" id="duree" placeholder="Durée (minutes)" required><br><br>
    <textarea id="description" placeholder="Description"></textarea><br><br>
    <input type="text" id="proprietaire" placeholder="Nom du propriétaire" required><br><br>
    <button type="submit">Ajouter l'examen</button>
  </form>
  <br>
  <a href="ajouter-question.html">Ajouter une question</a> |
  <a href="examens.html">Voir les examens</a>
  
  <style>
  
body {
  font-family: Arial, sans-serif;
  background-color: #f0f2f5;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;   
  align-items: center;
  padding: 40px 20px;
}

h1 {
  color: #0066aa;
  margin: 0;
  margin-bottom: 30px;      
  text-align: center;
}

form {
  background-color: #ffffff;
  width: 100%;
  max-width: 600px;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;      
}

input, textarea {
  width: 100%;              
  padding: 14px;
  margin: 12px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
  background-color: #f9f9f9;
  color: #333;
  font-size: 16px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0066aa;
  box-shadow: 0 0 8px rgba(0,102,170,0.4);
}

button {
  width: 100%;
  background-color: #0066aa;
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.3s ease;
  margin-top: 10px;
}

button:hover {
  background-color: #004f80;
}

.links {
  text-align: center;
}

.links a {
  color: #0066aa;
  text-decoration: none;
  margin: 0 12px;
}

.links a:hover {
  text-decoration: underline;
}

  </style>
  <script src="script.js"></script>
</body>
</html>
